name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Download offline speech model
        run: |
          curl -L -o model.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip -q model.zip
          rm -rf app/src/main/assets/model-en-us
          mv vosk-model-small-en-us-0.15 app/src/main/assets/model-en-us

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceControl-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
